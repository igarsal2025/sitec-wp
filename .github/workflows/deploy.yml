name: Deploy

on:
  push:
    branches:
      - main
      - staging
      - dev

jobs:
  rsync-deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/dev'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Tailwind (theme)
        working-directory: wp-content/themes/sitec
        run: |
          npm ci || npm install
          npm run build

      - name: Define target env
        id: envmap
        run: |
          if [ "${GITHUB_REF##*/}" = "main" ]; then echo "env=prod" >> $GITHUB_OUTPUT; fi
          if [ "${GITHUB_REF##*/}" = "staging" ]; then echo "env=staging" >> $GITHUB_OUTPUT; fi
          if [ "${GITHUB_REF##*/}" = "dev" ]; then echo "env=dev" >> $GITHUB_OUTPUT; fi

      - name: Deploy via rsync (prod)
        if: steps.envmap.outputs.env == 'prod'
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -az --delete --exclude-from=.rsyncignore
          path: ./
          remote_path: ${{ secrets.SITEC_PROD_REMOTE_PATH || '/home3/edaaeffm/public_html' }}
          remote_host: ${{ secrets.SITEC_PROD_REMOTE_HOST }}
          remote_user: ${{ secrets.SITEC_PROD_REMOTE_USER }}
          remote_key: ${{ secrets.SITEC_PROD_SSH_KEY }}
          remote_port: 22

      - name: Deploy via rsync (staging)
        if: steps.envmap.outputs.env == 'staging'
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -az --delete --exclude-from=.rsyncignore
          path: ./
          remote_path: ${{ secrets.SITEC_STAGING_REMOTE_PATH || '/home3/edaaeffm/public_html' }}
          remote_host: ${{ secrets.SITEC_STAGING_REMOTE_HOST }}
          remote_user: ${{ secrets.SITEC_STAGING_REMOTE_USER }}
          remote_key: ${{ secrets.SITEC_STAGING_SSH_KEY }}
          remote_port: 22

      - name: Deploy via rsync (dev)
        if: steps.envmap.outputs.env == 'dev'
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -az --delete --exclude-from=.rsyncignore
          path: ./
          remote_path: ${{ secrets.SITEC_DEV_REMOTE_PATH || '/home3/edaaeffm/public_html' }}
          remote_host: ${{ secrets.SITEC_DEV_REMOTE_HOST }}
          remote_user: ${{ secrets.SITEC_DEV_REMOTE_USER }}
          remote_key: ${{ secrets.SITEC_DEV_SSH_KEY }}
          remote_port: 22


